<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Icon mark: two overlapping circles matching reference design -->
  <!-- Dark blue circle (bottom-left) -->
  <circle cx="16" cy="20" r="14" fill="#1a237e"/>
  <!-- Light purple circle (top-right) overlapping -->
  <circle cx="26" cy="16" r="12" fill="#b39ddb" opacity="0.85"/>
  
  <!-- Wordmark: SHADOW POLL -->
  <text
    x="48"
    y="26"
    font-family="'Manrope', 'Inter', system-ui, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="0.02em"
  >
    <tspan fill="#e8e6ff">SHADOW</tspan><tspan dx="6" fill="#b39ddb">POLL</tspan>
  </text>
</svg>
