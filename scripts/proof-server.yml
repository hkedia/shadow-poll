# Shadow Poll — Local Proof Server
#
# Runs the Midnight proof server locally on port 6300.
# No API key required — the proof server accepts unauthenticated requests
# from localhost, making it suitable for contract deployment without ProofStation.
#
# Usage:
#   docker compose -f scripts/proof-server.yml up -d
#   docker compose -f scripts/proof-server.yml down
#
# Image version must match @midnight-ntwrk/ledger-v8 installed in this project.
# Current: ledger-v8@8.0.3 → proof-server:8.0.3
#
# The proof server exposes a single HTTP endpoint:
#   POST http://localhost:6300/prove
#
# Logs:
#   docker compose -f scripts/proof-server.yml logs -f

services:
  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    ports:
      # Bind only to loopback — do NOT expose to 0.0.0.0 in production
      - "127.0.0.1:6300:6300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
