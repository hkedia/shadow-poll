<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background pill -->
  <rect width="32" height="32" rx="8" fill="#0F0F1B"/>
  <!-- Left circle: deep navy/indigo -->
  <circle cx="11" cy="16" r="9" fill="#1E1B4B"/>
  <!-- Right circle: brand purple -->
  <circle cx="21" cy="16" r="9" fill="#A29BFE" opacity="0.82"/>
  <!-- Overlap blend -->
  <ellipse cx="16" cy="16" rx="4" ry="8" fill="#6C63D5" opacity="0.5"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#C4BEFE" stroke-width="1.8" opacity="0.7"/>
  <!-- Inner fill -->
  <circle cx="16" cy="16" r="2.4" fill="#E8E6FF" opacity="0.6"/>
  <!-- Center white dot -->
  <circle cx="16" cy="16" r="1.4" fill="#FFFFFF"/>
</svg>
